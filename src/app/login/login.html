<div class="login-wrapper">
  <div class="login-card">

    <div class="login-logo">
      <p class="logo-title">InternshipMatch</p>
      <span class="logo-badge">HAU SOC</span>
    </div>

    <h2 class="login-heading">
      {{ isSignupMode ? 'Student Registration' : 'Secure Portal Access' }}
    </h2>
    <p class="login-sub">Advanced Dynamic Web Development (6AWEB)</p>

    <div class="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="loginData.username"
               placeholder="Enter your username"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="loginData.password"
               (keyup.enter)="isSignupMode ? onSignup() : onLogin()"
               placeholder="Enter your password"/>
      </div>

      <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button class="btn-login" (click)="isSignupMode ? onSignup() : onLogin()">
        {{ isSignupMode ? 'Register Student' : 'Enter System' }}
      </button>

      <a class="toggle-link" (click)="toggleMode()">
        {{ isSignupMode ? 'Already have an account? Log in' : 'New student? Sign up here' }}
      </a>

      <div class="divider" *ngIf="!isSignupMode">
        <span>or</span>
      </div>

      <button class="btn-admin" *ngIf="!isSignupMode" (click)="onAdminQuickAccess()">
        Admin Quick Access 🔑
      </button>
    </div>

  </div>
</div>
