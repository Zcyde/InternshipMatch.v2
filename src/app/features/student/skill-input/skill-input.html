<div class="skill-input-wrapper">

  <button class="btn-back" (click)="goBack()">← Back to roles</button>

  <div class="skill-header">
    <h1>{{ listingTitle }}</h1>
    <p>Rate your proficiency for each required skill</p>
  </div>

  <!-- Loading state -->
  <div class="loading" *ngIf="isLoading">
    <p>Loading skills...</p>
  </div>

  <!-- Error state -->
  <div class="error-message" *ngIf="errorMessage">
    <p>{{ errorMessage }}</p>
  </div>

  <!-- Skills list -->
  <div class="skills-list" *ngIf="!isLoading && skills.length > 0">
    <div class="skill-item" *ngFor="let skill of skills">

      <div class="skill-info">
        <span class="skill-name">{{ skill.name }}</span>
        <span class="skill-level-label">
          {{ proficiencyLabel(getProficiencyForSkill(skill.name)) }}
        </span>
      </div>

      <div class="proficiency-buttons">
        <button
          *ngFor="let level of [1,2,3,4,5]"
          class="level-btn"
          [class.active]="getProficiencyForSkill(skill.name) === level"
          (click)="setProficiency(skill.name, level)">
          {{ level }}
        </button>
      </div>

    </div>
  </div>

  <div class="submit-section" *ngIf="!isLoading">
    <button
      class="btn-compute"
      (click)="computeMatch()"
      [disabled]="isComputing">
      {{ isComputing ? 'Computing...' : 'Check my compatibility →' }}
    </button>
    <p class="submit-note">Skills with no rating selected will be treated as missing</p>
  </div>

</div>
